# Router Config RAG Assistant - Docker Compose
# Two-service architecture: Slack bot + Chainlit Web UI
# Ollama runs on host for best CPU performance

services:
  slack-bot:
    build: .
    container_name: router-config-slack-bot
    command: python src/slack_bot.py
    env_file: .env
    environment:
      # Connect to Ollama on host machine
      OLLAMA_HOST: http://host.docker.internal:11434
      CHROMADB_PATH: /app/data/chromadb
      ADOC_FILES_PATH: /app/data/adoc_files
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Read-only access to data (index is built outside container)
      - ./data/chromadb:/app/data/chromadb:ro
      - ./data/adoc_files:/app/data/adoc_files:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "python", "-c", "from src.config import Config; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-ui:
    build: .
    container_name: router-config-web-ui
    command: chainlit run src/web_ui.py --host 0.0.0.0 --port 8000
    ports:
      - "8080:8000"
    env_file: .env
    environment:
      # Connect to Ollama on host machine
      OLLAMA_HOST: http://host.docker.internal:11434
      CHROMADB_PATH: /app/data/chromadb
      ADOC_FILES_PATH: /app/data/adoc_files
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Read-only access to data
      - ./data/chromadb:/app/data/chromadb:ro
      - ./data/adoc_files:/app/data/adoc_files:ro
      # Chainlit config for UI customization
      - ./.chainlit:/app/.chainlit
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      # Chainlit doesn't have a /health endpoint, check if port is listening
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# Network for inter-service communication (if needed in future)
